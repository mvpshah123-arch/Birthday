<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<style>
    body {
        margin: 0;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        color: white;
        padding: 20px;
    }

    h1 {
        font-size: 2.5rem;
        margin: 0;
    }

    p {
        font-size: 1.2rem;
        margin-top: 10px;
    }

    button {
        margin-top: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 25px;
        background: #ff6f61;
        color: white;
        font-size: 1rem;
        cursor: pointer;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
    }

    @media (max-width: 600px) {
        h1 {
            font-size: 2rem;
        }
        p {
            font-size: 1rem;
        }
    }
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">
    <h1>🎉 Happy Birthday 
Eriani binti Martinus! 🎂</h1>
    <p>Untuk perempuan hebat yang independent,
 rajin cari rezeki, pandai masak, dan sentiasa ceria.
Semoga hidup awak sentiasa manis macam senyuman awak 🌸 💖

</p>Umur je makin bertambah, tapi perangai kena kekal muda 😆 Semoga panjang umur dan murah rezeki!”</p>

    <button onclick="launchConfetti()">Tekan untuk Suprise 🎊</button>
</div>


<script>
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');

let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createParticle() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 6 + 2,
        d: Math.random() * 10 + 5,
        color: `hsl(${Math.random()*360}, 100%, 50%)`,
        tilt: Math.random() * 10 - 10
    };
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.r, p.r);
    });
    updateParticles();
}

function updateParticles() {
    particles.forEach((p, i) => {
        p.y += p.d * 0.2;
        p.x += Math.sin(p.y * 0.05);

        if (p.y > canvas.height) {
            particles[i] = createParticle();
            particles[i].y = 0;
        }
    });
}

function launchConfetti() {
    particles = [];
    for (let i = 0; i < 150; i++) {
        particles.push(createParticle());
    }
    animate();
}

function animate() {
    drawParticles();
    requestAnimationFrame(animate);
}
</script>

</body>
</html>
